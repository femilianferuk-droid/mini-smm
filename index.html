<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vest Smm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #08080f; --surface: #111122; --surface2: #1a1a35; --border: #252548;
            --purple: #8b5cf6; --purple-light: #a78bfa; --green: #34d399;
            --gold: #f59e0b; --diamond: #60a5fa; --text: #e2e8f0; --text-dim: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        @keyframes glow { 0%,100%{box-shadow:0 0 5px rgba(139,92,246,0.3)} 50%{box-shadow:0 0 20px rgba(139,92,246,0.6)} }

        .header { background: linear-gradient(135deg,#3b0764,#5b21b6,#6d28d9); padding:20px 18px; text-align:center; position:sticky; top:0; z-index:20; }
        .header .logo { font-size:20px; font-weight:800; animation:pulse 2s infinite; }
        .header .step { font-size:12px; color:#c4b5fd; margin-top:4px; }

        .level-tabs { display:flex; gap:6px; padding:10px 16px; background:var(--surface); justify-content:center; border-bottom:1px solid var(--border); }
        .level-tab { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--text-dim); transition:0.3s; }
        .level-tab.active { color:#fff; animation:glow 2s infinite; }
        .level-tab.lite.active { background:#6b7280; border-color:#6b7280; }
        .level-tab.pro.active { background:var(--gold); border-color:var(--gold); color:#000; }
        .level-tab.max.active { background:var(--diamond); border-color:var(--diamond); }
        .level-info { text-align:center; padding:6px 16px; font-size:10px; color:var(--text-dim); background:var(--surface); }

        .breadcrumb { padding:8px 16px; background:var(--surface); display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
        .back-btn { width:30px; height:30px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); color:var(--purple-light); font-size:15px; cursor:pointer; }
        .back-btn:active { background:var(--purple); color:#fff; }
        .path { font-size:13px; color:var(--purple-light); }

        .search-wrap { padding:10px 16px; }
        .search-wrap input { width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; outline:none; }
        .search-wrap input:focus { border-color:var(--purple); }

        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 16px; }
        .p-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 10px; text-align:center; cursor:pointer; transition:0.3s; animation:fadeInScale 0.4s ease-out both; }
        .p-card:nth-child(1){animation-delay:0.05s}.p-card:nth-child(2){animation-delay:0.1s}.p-card:nth-child(3){animation-delay:0.15s}.p-card:nth-child(4){animation-delay:0.2s}.p-card:nth-child(5){animation-delay:0.25s}.p-card:nth-child(6){animation-delay:0.3s}
        .p-card:active { background:#1e1b4b; transform:scale(0.95); }
        .p-card img { width:48px; height:48px; object-fit:contain; margin-bottom:8px; border-radius:12px; }
        .p-card:hover img { animation:float 1.5s ease-in-out infinite; }
        .p-card .p-name { font-size:12px; font-weight:600; }
        .p-card .p-count { font-size:10px; color:var(--purple-light); margin-top:2px; }

        .list { padding:6px 16px; }
        .list-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:8px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:0.3s; animation:slideInLeft 0.3s ease-out both; }
        .list-item:nth-child(1){animation-delay:0.05s}.list-item:nth-child(2){animation-delay:0.1s}.list-item:nth-child(3){animation-delay:0.15s}.list-item:nth-child(4){animation-delay:0.2s}.list-item:nth-child(5){animation-delay:0.25s}
        .list-item:active { background:#1e1b4b; }
        .list-item .li-name { font-size:14px; font-weight:500; }
        .list-item .li-badge { background:#2d2050; color:var(--purple-light); padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }

        .s-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; cursor:pointer; transition:0.3s; animation:fadeInUp 0.3s ease-out both; }
        .s-card:nth-child(1){animation-delay:0.03s}.s-card:nth-child(2){animation-delay:0.06s}.s-card:nth-child(3){animation-delay:0.09s}.s-card:nth-child(4){animation-delay:0.12s}.s-card:nth-child(5){animation-delay:0.15s}
        .s-card:active { background:#1e1b4b; }
        .s-card .s-name { font-size:13px; font-weight:500; margin-bottom:8px; line-height:1.3; }
        .s-card .s-price { font-size:14px; font-weight:700; padding:4px 10px; border-radius:6px; display:inline-block; }
        .s-price.lite { background:#1f2937; color:#9ca3af; }
        .s-price.pro { background:#1f1a0a; color:var(--gold); }
        .s-price.max { background:#0f1a2e; color:var(--diamond); }

        .detail-wrap { padding:16px; }
        .detail-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; animation:fadeInScale 0.4s ease-out; }
        .detail-card h3 { font-size:16px; font-weight:600; margin-bottom:14px; }
        .price-box { text-align:center; padding:14px; border-radius:12px; margin-bottom:14px; border:1px solid var(--border); }
        .price-box .pl-name { font-size:11px; font-weight:600; margin-bottom:4px; }
        .price-box .pl-price { font-size:22px; font-weight:800; }
        .price-box.lite { background:#1f2937; } .pl-price.lite { color:#d1d5db; }
        .price-box.pro { background:#1f1a0a; border-color:#92400e; animation:glow 2s infinite; } .pl-price.pro { color:var(--gold); }
        .price-box.max { background:#0f1a2e; border-color:#1e40af; } .pl-price.max { color:var(--diamond); }
        .detail-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #1a1a30; font-size:13px; }
        .detail-row .dl { color:var(--text-dim); } .detail-row .dv { color:var(--text); font-weight:500; }

        .btn-order { display:block; width:100%; margin-top:16px; padding:14px; background:linear-gradient(135deg,#6d28d9,#8b5cf6); border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:0.3s; }
        .btn-order:active { opacity:0.85; transform:scale(0.97); }

        .footer { text-align:center; padding:20px 16px 28px; font-size:11px; color:#4b3f6b; }
        .footer span { color:var(--purple); font-weight:700; }

        .hidden { display:none!important; }
        .loader { text-align:center; padding:60px; color:var(--purple-light); }
        .loader .dot { display:inline-block; width:10px; height:10px; background:var(--purple); border-radius:50%; margin:0 4px; animation:bounce 1.4s infinite; }
        .loader .dot:nth-child(2){animation-delay:0.2s}.loader .dot:nth-child(3){animation-delay:0.4s}
        @keyframes bounce { 0%,80%,100%{transform:scale(0);opacity:0.3} 40%{transform:scale(1);opacity:1} }
        .empty { text-align:center; padding:60px; color:#4b5563; }
    </style>
</head>
<body>
<div class="header"><div class="logo">⚡ Vest Smm</div><div class="step" id="step-title">Выберите платформу</div></div>
<div class="level-tabs" id="level-tabs">
    <div class="level-tab lite active" onclick="setLevel('lite')">🪨 Lite</div>
    <div class="level-tab pro" onclick="setLevel('pro')">🥇 Pro</div>
    <div class="level-tab max" onclick="setLevel('max')">💎 Max</div>
</div>
<div class="level-info" id="level-info">Скидка: Lite 0% | Pro 4% | Max 10%</div>
<div class="breadcrumb hidden" id="breadcrumb"><button class="back-btn" onclick="goBack()">←</button><span class="path" id="breadcrumb-text"></span></div>
<div class="search-wrap hidden" id="search-box"><input type="text" id="search" placeholder="🔍 Поиск услуг..." oninput="filterServices()"></div>
<div class="grid" id="platforms-screen"></div>
<div class="list hidden" id="categories-screen"></div>
<div class="list hidden" id="services-screen"></div>
<div class="detail-wrap hidden" id="detail-screen"></div>
<div class="loader hidden" id="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div><p style="margin-top:14px">Загрузка...</p></div>
<div class="footer">Powered by <span>Vest Smm</span></div>

<script>
const API_KEY = 'd2kALxwu1KIstaUHWXzeb8S2OzmgIg4ct0Z8WCe76I74lZS3bctT9ogN3Eex';
const BOT_USERNAME = 'Vestsmmmbot';
const API_URL = 'https://smmway.ru/api/v2';
const MARGIN = 1.07;
const DISCOUNTS = { lite: 0, pro: 4, max: 10 };

let allServices = [], platforms = {}, currentPlatform = '', currentCategory = '', currentServices = [], currentLevel = 'lite';
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();

const platformLogos = {
    'Instagram': 'https://cdn-icons-png.flaticon.com/128/2111/2111463.png',
    'Telegram': 'https://cdn-icons-png.flaticon.com/128/2111/2111646.png',
    'YouTube': 'https://cdn-icons-png.flaticon.com/128/1384/1384060.png',
    'Twitch': 'https://cdn-icons-png.flaticon.com/128/2111/2111668.png',
    'TikTok': 'https://cdn-icons-png.flaticon.com/128/3046/3046121.png',
    'Facebook': 'https://cdn-icons-png.flaticon.com/128/5968/5968764.png',
    'Twitter/X': 'https://cdn-icons-png.flaticon.com/128/5969/5969020.png',
    'VK': 'https://cdn-icons-png.flaticon.com/128/2111/2111654.png',
    'Discord': 'https://cdn-icons-png.flaticon.com/128/5968/5968756.png',
    'Spotify': 'https://cdn-icons-png.flaticon.com/128/174/174872.png',
    'SoundCloud': 'https://cdn-icons-png.flaticon.com/128/145/145808.png',
    'Другие': 'https://cdn-icons-png.flaticon.com/128/149/149071.png'
};

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function hideAll() { ['platforms-screen','categories-screen','services-screen','detail-screen','loader','search-box','breadcrumb'].forEach(hide); }

function setLevel(l) {
    currentLevel = l;
    document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.level-tab.' + l).classList.add('active');
    document.getElementById('level-info').textContent = 'Скидка: Lite 0% | Pro 4% | Max 10% | Ваш: ' + l.toUpperCase();
    if (currentServices.length) displayServices(currentServices);
    if (window._ld) { var d = window._ld; showDetail(d.id, d.name, d.rate, d.min, d.max); }
}

function getPrice(rate) {
    return (parseFloat(rate) * MARGIN * (1 - DISCOUNTS[currentLevel] / 100)).toFixed(2);
}

async function init() {
    hideAll(); show('loader');
    try {
        var r = await fetch(API_URL + '?action=services&key=' + API_KEY);
        allServices = await r.json();
        buildPlatforms(); renderPlatforms();
    } catch(e) { document.getElementById('platforms-screen').innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
}

function buildPlatforms() {
    platforms = {};
    allServices.forEach(function(s) {
        var n = s.name.toLowerCase(), p = 'Другие';
        if (n.includes('instagram')) p = 'Instagram';
        else if (n.includes('telegram')) p = 'Telegram';
        else if (n.includes('youtube')) p = 'YouTube';
        else if (n.includes('twitch')) p = 'Twitch';
        else if (n.includes('tiktok')) p = 'TikTok';
        else if (n.includes('facebook')) p = 'Facebook';
        else if (n.includes('twitter') || n.includes('x ')) p = 'Twitter/X';
        else if (n.includes('vk') || n.includes('вк')) p = 'VK';
        else if (n.includes('discord')) p = 'Discord';
        else if (n.includes('spotify')) p = 'Spotify';
        else if (n.includes('soundcloud')) p = 'SoundCloud';
        if (!platforms[p]) platforms[p] = [];
        platforms[p].push(s);
    });
}

function getCategory(name) {
    var n = name.toLowerCase();
    if (n.includes('подписчик') || n.includes('subscriber') || n.includes('follow')) return 'Подписчики';
    if (n.includes('лайк') || n.includes('like')) return 'Лайки';
    if (n.includes('просмотр') || n.includes('view')) return 'Просмотры';
    if (n.includes('коммент') || n.includes('comment')) return 'Комментарии';
    if (n.includes('репост') || n.includes('repost') || n.includes('share')) return 'Репосты';
    return 'Другое';
}

function renderPlatforms() {
    hideAll(); show('platforms-screen');
    document.getElementById('step-title').textContent = 'Выберите платформу';
    var h = '';
    Object.keys(platforms).sort().forEach(function(p) {
        h += '<div class="p-card" onclick="selectPlatform(\'' + p + '\')"><img src="' + (platformLogos[p] || platformLogos['Другие']) + '" alt="' + p + '"><div class="p-name">' + p + '</div><div class="p-count">' + platforms[p].length + ' услуг</div></div>';
    });
    document.getElementById('platforms-screen').innerHTML = h;
}

function selectPlatform(p) {
    currentPlatform = p;
    var cats = {};
    platforms[p].forEach(function(s) {
        var c = getCategory(s.name);
        if (!cats[c]) cats[c] = [];
        cats[c].push(s);
    });
    window.cats = cats;
    renderCategories();
}

function renderCategories() {
    hideAll(); show('categories-screen'); show('breadcrumb');
    document.getElementById('breadcrumb-text').textContent = currentPlatform;
    document.getElementById('step-title').textContent = 'Выберите категорию';
    var h = '';
    Object.keys(window.cats).forEach(function(c) {
        h += '<div class="list-item" onclick="selectCategory(\'' + c + '\')"><span class="li-name">' + c + '</span><span class="li-badge">' + window.cats[c].length + '</span></div>';
    });
    document.getElementById('categories-screen').innerHTML = h;
}

function selectCategory(c) {
    currentCategory = c;
    document.getElementById('search').value = '';
    currentServices = window.cats[c];
    renderServices();
}

function renderServices() {
    hideAll(); show('services-screen'); show('search-box'); show('breadcrumb');
    document.getElementById('breadcrumb-text').textContent = currentPlatform + ' › ' + currentCategory;
    document.getElementById('step-title').textContent = 'Выберите услугу';
    displayServices(currentServices);
}

function displayServices(services) {
    var div = document.getElementById('services-screen');
    if (!services.length) { div.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }
    var h = '';
    services.forEach(function(s) {
        var price = getPrice(s.rate);
        h += '<div class="s-card" onclick="showDetail(' + s.service + ',\'' + esc(s.name) + '\',\'' + s.rate + '\',' + s.min + ',' + s.max + ')"><div class="s-name">' + esc(s.name) + '</div><span class="s-price ' + currentLevel + '">' + price + ' ₽ / 1000</span></div>';
    });
    div.innerHTML = h;
}

function filterServices() {
    var q = document.getElementById('search').value.toLowerCase();
    displayServices(currentServices.filter(function(s) { return s.name.toLowerCase().includes(q); }));
}

function showDetail(id, name, rate, min, max) {
    hideAll(); show('detail-screen'); show('breadcrumb');
    document.getElementById('breadcrumb-text').textContent = name.substring(0, 35);
    document.getElementById('step-title').textContent = 'Детали услуги';
    var price = getPrice(rate);
    window._ld = { id: id, name: name, rate: rate, min: min, max: max };
    var ln = { lite: '🪨 Lite (0%)', pro: '🥇 Pro (4%)', max: '💎 Max (10%)' };
    document.getElementById('detail-screen').innerHTML = '<div class="detail-card"><h3>' + name + '</h3><div class="price-box ' + currentLevel + '"><div class="pl-name">' + ln[currentLevel] + '</div><div class="pl-price ' + currentLevel + '">' + price + ' ₽</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px">за 1000 единиц</div></div><div class="detail-row"><span class="dl">Мин. заказ</span><span class="dv">' + min + '</span></div><div class="detail-row"><span class="dl">Макс. заказ</span><span class="dv">' + max + '</span></div><button class="btn-order" onclick="orderService(' + id + ',\'' + esc(name) + '\',\'' + price + '\',' + min + ',' + max + ')">🚀 Заказать</button></div>';
}

function orderService(id, name, price, min, max) {
    var p = 'service_id=' + id + '&name=' + encodeURIComponent(name) + '&price=' + price + '&min=' + min + '&max=' + max + '&level=' + currentLevel;
    tg.openTelegramLink('https://t.me/' + BOT_USERNAME + '?start=mini_' + p);
    tg.close();
}

function goBack() {
    if (!document.getElementById('detail-screen').classList.contains('hidden')) renderServices();
    else if (!document.getElementById('services-screen').classList.contains('hidden')) renderCategories();
    else if (!document.getElementById('categories-screen').classList.contains('hidden')) renderPlatforms();
}

function esc(t) { return (t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

init();
</script>
</body>
</html>
