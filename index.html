<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vest Smm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d14;
            color: #fff;
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #6b21a8, #7c3aed);
            padding: 18px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h2 { font-size: 18px; font-weight: 600; }
        .header .sub { font-size: 12px; color: #c4b5fd; margin-top: 4px; }

        /* Хлебные крошки */
        .breadcrumb {
            padding: 12px 16px;
            font-size: 13px;
            color: #a78bfa;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .breadcrumb span { color: #8b5cf6; }
        .back-btn {
            background: none;
            border: none;
            color: #c4b5fd;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* Сетка соцсетей */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
        .card {
            background: #1e1b4b;
            border: 1px solid #312e81;
            border-radius: 14px;
            padding: 20px 14px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            font-weight: 500;
            color: #e0e7ff;
        }
        .card:active {
            background: #312e81;
            border-color: #818cf8;
            transform: scale(0.96);
        }
        .card .icon { font-size: 32px; margin-bottom: 8px; }

        /* Категории */
        .cat-list { padding: 8px 16px; }
        .cat-item {
            background: #1e1b4b;
            border: 1px solid #312e81;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cat-item:active { background: #312e81; border-color: #818cf8; }
        .cat-item .name { font-size: 15px; font-weight: 500; }
        .cat-item .count { font-size: 12px; color: #a78bfa; }

        /* Услуги */
        .service-list { padding: 8px 16px; }
        .service-item {
            background: #1e1b4b;
            border: 1px solid #312e81;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .service-item:active { background: #312e81; border-color: #818cf8; }
        .service-item .s-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .service-item .s-info { font-size: 12px; color: #a5b4fc; display: flex; justify-content: space-between; }
        .service-item .s-price { color: #34d399; font-weight: 600; }

        /* Детали услуги */
        .detail-card {
            margin: 16px;
            background: #1e1b4b;
            border: 1px solid #312e81;
            border-radius: 16px;
            padding: 20px;
        }
        .detail-card h3 { font-size: 16px; margin-bottom: 12px; color: #e0e7ff; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #1e1b4b; }
        .detail-row .label { color: #94a3b8; }
        .detail-row .value { color: #e0e7ff; font-weight: 500; }
        .detail-row .price-value { color: #34d399; font-weight: 700; font-size: 16px; }

        .order-btn {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .order-btn:active { opacity: 0.85; transform: scale(0.97); }

        /* Поиск */
        .search-box { padding: 12px 16px; }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #312e81;
            background: #1e1b4b;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-box input::placeholder { color: #6b7280; }

        .loader { text-align: center; padding: 60px; color: #8b5cf6; }
        .empty { text-align: center; padding: 60px; color: #6b7280; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Vest Smm</h2>
        <div class="sub" id="step-title">Выберите соцсеть</div>
    </div>

    <div class="breadcrumb hidden" id="breadcrumb">
        <button class="back-btn" onclick="goBack()">←</button>
        <span id="breadcrumb-text"></span>
    </div>

    <div class="search-box hidden" id="search-box">
        <input type="text" id="search" placeholder="🔍 Поиск услуг..." oninput="filterServices()">
    </div>

    <!-- Экран соцсетей -->
    <div class="grid" id="platforms-screen"></div>

    <!-- Экран категорий -->
    <div class="cat-list hidden" id="categories-screen"></div>

    <!-- Экран услуг -->
    <div class="service-list hidden" id="services-screen"></div>

    <!-- Экран описания -->
    <div id="detail-screen" class="hidden"></div>

    <div class="loader hidden" id="loader">Загрузка...</div>

    <script>
        const API_KEY = 'd2kALxwu1KIstaUHWXzeb8S2OzmgIg4ct0Z8WCe76I74lZS3bctT9ogN3Eex';
        const BOT_USERNAME = 'Vestsmmmbot';
        const API_URL = 'https://smmway.ru/api/v2';
        const SERVICE_MARGIN = 1.07;

        let allServices = [];
        let platforms = {};
        let categories = {};
        let currentPlatform = '';
        let currentCategory = '';

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const platformIcons = {
            'Instagram': '📷', 'Telegram': '✈️', 'YouTube': '▶️', 'Twitch': '🎮',
            'TikTok': '🎵', 'Facebook': '📘', 'Twitter/X': '🐦', 'VK': '💬',
            'Discord': '🎧', 'Spotify': '🎶', 'SoundCloud': '☁️', 'Другие': '📦'
        };

        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }
        function hideAll() {
            ['platforms-screen','categories-screen','services-screen','detail-screen','loader','search-box','breadcrumb'].forEach(hide);
        }

        async function init() {
            hideAll();
            show('loader');
            try {
                const r = await fetch(`${API_URL}?action=services&key=${API_KEY}`);
                allServices = await r.json();
                buildPlatforms();
                renderPlatforms();
            } catch(e) {
                document.getElementById('platforms-screen').innerHTML = '<div class="empty">Ошибка загрузки</div>';
            }
        }

        function buildPlatforms() {
            platforms = {};
            allServices.forEach(s => {
                const n = s.name.toLowerCase();
                let p = 'Другие';
                if (n.includes('instagram')) p = 'Instagram';
                else if (n.includes('telegram')) p = 'Telegram';
                else if (n.includes('youtube')) p = 'YouTube';
                else if (n.includes('twitch')) p = 'Twitch';
                else if (n.includes('tiktok')) p = 'TikTok';
                else if (n.includes('facebook')) p = 'Facebook';
                else if (n.includes('twitter') || n.includes('x ')) p = 'Twitter/X';
                else if (n.includes('vk ') || n.includes('вк')) p = 'VK';
                else if (n.includes('discord')) p = 'Discord';
                else if (n.includes('spotify')) p = 'Spotify';
                else if (n.includes('soundcloud')) p = 'SoundCloud';
                if (!platforms[p]) platforms[p] = [];
                platforms[p].push(s);
            });
        }

        function getCategory(name) {
            const n = name.toLowerCase();
            if (n.includes('подписчик') || n.includes('subscriber') || n.includes('follow')) return 'Подписчики';
            if (n.includes('лайк') || n.includes('like')) return 'Лайки';
            if (n.includes('просмотр') || n.includes('view')) return 'Просмотры';
            if (n.includes('коммент') || n.includes('comment')) return 'Комментарии';
            if (n.includes('репост') || n.includes('repost') || n.includes('share')) return 'Репосты';
            return 'Другое';
        }

        function renderPlatforms() {
            hideAll();
            show('platforms-screen');
            document.getElementById('step-title').textContent = 'Выберите соцсеть';
            const div = document.getElementById('platforms-screen');
            div.innerHTML = Object.keys(platforms).sort().map(p => `
                <div class="card" onclick="selectPlatform('${p}')">
                    <div class="icon">${platformIcons[p] || '📦'}</div>
                    <div>${p}</div>
                    <div style="font-size:11px;color:#818cf8;margin-top:4px">${platforms[p].length} услуг</div>
                </div>
            `).join('');
        }

        function selectPlatform(platform) {
            currentPlatform = platform;
            const services = platforms[platform];
            categories = {};
            services.forEach(s => {
                const c = getCategory(s.name);
                if (!categories[c]) categories[c] = [];
                categories[c].push(s);
            });
            renderCategories();
        }

        function renderCategories() {
            hideAll();
            show('categories-screen');
            show('breadcrumb');
            document.getElementById('breadcrumb-text').textContent = currentPlatform;
            document.getElementById('step-title').textContent = 'Выберите категорию';
            const div = document.getElementById('categories-screen');
            div.innerHTML = Object.keys(categories).map(c => `
                <div class="cat-item" onclick="selectCategory('${c}')">
                    <span class="name">${c}</span>
                    <span class="count">${categories[c].length} услуг</span>
                </div>
            `).join('');
        }

        function selectCategory(category) {
            currentCategory = category;
            document.getElementById('search').value = '';
            renderServices(categories[category]);
        }

        function renderServices(services) {
            hideAll();
            show('services-screen');
            show('search-box');
            show('breadcrumb');
            document.getElementById('breadcrumb-text').textContent = currentPlatform + ' › ' + currentCategory;
            document.getElementById('step-title').textContent = 'Выберите услугу';
            window.currentServices = services;
            displayServices(services);
        }

        function displayServices(services) {
            const div = document.getElementById('services-screen');
            if (!services.length) {
                div.innerHTML = '<div class="empty">Ничего не найдено</div>';
                return;
            }
            div.innerHTML = services.map(s => {
                const price = (parseFloat(s.rate) * SERVICE_MARGIN).toFixed(2);
                return `
                    <div class="service-item" onclick="showDetail(${s.service}, '${escHtml(s.name)}', '${price}', ${s.min}, ${s.max}, '${escHtml(s.rate)}')">
                        <div class="s-name">${escHtml(s.name)}</div>
                        <div class="s-info">
                            <span>Мин: ${s.min} | Макс: ${s.max}</span>
                            <span class="s-price">≈ ${price} ₽/1000</span>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterServices() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = (window.currentServices || []).filter(s => s.name.toLowerCase().includes(q));
            displayServices(filtered);
        }

        function showDetail(serviceId, name, price, min, max, rate) {
            hideAll();
            show('detail-screen');
            show('breadcrumb');
            document.getElementById('breadcrumb-text').textContent = name.substring(0, 30);
            document.getElementById('step-title').textContent = 'Описание услуги';

            document.getElementById('detail-screen').innerHTML = `
                <div class="detail-card">
                    <h3>${name}</h3>
                    <div class="detail-row"><span class="label">Цена</span><span class="price-value">${price} ₽ / 1000</span></div>
                    <div class="detail-row"><span class="label">Минимальный заказ</span><span class="value">${min}</span></div>
                    <div class="detail-row"><span class="label">Максимальный заказ</span><span class="value">${max}</span></div>
                    <button class="order-btn" onclick="orderService(${serviceId}, '${escHtml(name)}', '${price}', ${min}, ${max})">🚀 Заказать</button>
                </div>`;
        }

        function orderService(serviceId, name, price, min, max) {
            const params = new URLSearchParams({ service_id: serviceId, name: name, price: price, min: min, max: max });
            tg.openTelegramLink(`https://t.me/${BOT_USERNAME}?start=mini_${params.toString()}`);
            tg.close();
        }

        function goBack() {
            if (!document.getElementById('detail-screen').classList.contains('hidden')) {
                renderServices(window.currentServices || []);
            } else if (!document.getElementById('services-screen').classList.contains('hidden')) {
                renderCategories();
            } else if (!document.getElementById('categories-screen').classList.contains('hidden')) {
                renderPlatforms();
            }
        }

        function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        init();
    </script>
</body>
</html>
