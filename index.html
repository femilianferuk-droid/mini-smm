<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vest Smm — Услуги</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }
        .header {
            background: #1a1a1a;
            padding: 14px 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .header input::placeholder { color: #888; }
        .tabs {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            overflow-x: auto;
            background: #1a1a1a;
        }
        .tabs::-webkit-scrollbar { height: 0; }
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: #2a2a2a;
            color: #aaa;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            font-size: 13px;
            transition: 0.2s;
        }
        .tab.active {
            background: #4a90d9;
            color: #fff;
        }
        .service-card {
            background: #1a1a1a;
            margin: 8px 16px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid transparent;
        }
        .service-card:active {
            background: #252525;
            border-color: #4a90d9;
            transform: scale(0.98);
        }
        .service-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .service-info {
            font-size: 12px;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            color: #4caf50;
            font-weight: 600;
        }
        .loader {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4a90d9;
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .empty {
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }
        .count {
            font-size: 11px;
            color: #666;
            padding: 4px 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="search" placeholder="🔍 Поиск услуг..." oninput="filterServices()">
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="count" id="count"></div>
    <div id="services"></div>

    <script>
        const API_KEY = 'd2kALxwu1KIstaUHWXzeb8S2OzmgIg4ct0Z8WCe76I74lZS3bctT9ogN3Eex';
        const BOT_USERNAME = 'Vestsmmmbot';
        const API_URL = 'https://smmway.ru/api/v2';
        const SERVICE_MARGIN = 1.07;

        let allServices = [];
        let currentTab = 'all';
        let platforms = {};

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function loadServices() {
            document.getElementById('services').innerHTML = `
                <div class="loader">
                    <span></span><span></span><span></span>
                    <p style="margin-top:12px">Загрузка услуг...</p>
                </div>`;

            try {
                const response = await fetch(`${API_URL}?action=services&key=${API_KEY}`);
                if (!response.ok) throw new Error('API error');
                allServices = await response.json();
                document.getElementById('count').textContent = `Услуг загружено: ${allServices.length}`;
                buildPlatforms();
                renderAll();
            } catch (e) {
                document.getElementById('services').innerHTML = `
                    <div class="empty">
                        <p>😔 Ошибка загрузки услуг</p>
                        <p style="font-size:12px;margin-top:6px">Попробуйте позже</p>
                    </div>`;
            }
        }

        function getPlatform(name) {
            const n = name.toLowerCase();
            if (n.includes('instagram')) return 'Instagram';
            if (n.includes('telegram')) return 'Telegram';
            if (n.includes('youtube')) return 'YouTube';
            if (n.includes('twitch')) return 'Twitch';
            if (n.includes('tiktok')) return 'TikTok';
            if (n.includes('facebook')) return 'Facebook';
            if (n.includes('twitter') || n.includes('x ')) return 'Twitter/X';
            if (n.includes('vk ') || n.includes('вк')) return 'VK';
            if (n.includes('discord')) return 'Discord';
            if (n.includes('spotify')) return 'Spotify';
            if (n.includes('soundcloud')) return 'SoundCloud';
            return 'Другие';
        }

        function buildPlatforms() {
            platforms = {};
            allServices.forEach(s => {
                const p = getPlatform(s.name);
                if (!platforms[p]) platforms[p] = [];
                platforms[p].push(s);
            });
        }

        function renderAll() {
            const tabsDiv = document.getElementById('tabs');
            tabsDiv.innerHTML = `<button class="tab ${currentTab === 'all' ? 'active' : ''}" onclick="setTab('all')">Все</button>`;
            Object.keys(platforms).sort().forEach(p => {
                tabsDiv.innerHTML += `<button class="tab ${currentTab === p ? 'active' : ''}" onclick="setTab('${p}')">${p}</button>`;
            });
            filterServices();
        }

        function setTab(tab) {
            currentTab = tab;
            document.getElementById('search').value = '';
            renderAll();
        }

        function filterServices() {
            const query = document.getElementById('search').value.toLowerCase();
            let filtered = currentTab === 'all' ? allServices : (platforms[currentTab] || []);

            if (query) {
                filtered = filtered.filter(s => s.name.toLowerCase().includes(query));
            }

            const div = document.getElementById('services');
            if (filtered.length === 0) {
                div.innerHTML = '<div class="empty"><p>😶 Ничего не найдено</p></div>';
                return;
            }

            div.innerHTML = filtered.map(s => {
                const price = (parseFloat(s.rate) * SERVICE_MARGIN).toFixed(2);
                return `
                    <div class="service-card" onclick="selectService(${s.service}, '${escapeHtml(s.name)}', '${price}', ${s.min}, ${s.max})">
                        <div class="service-name">${escapeHtml(s.name)}</div>
                        <div class="service-info">
                            <span>Мин: ${s.min} | Макс: ${s.max}</span>
                            <span class="price">≈ ${price} ₽/1000</span>
                        </div>
                    </div>`;
            }).join('');
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function selectService(serviceId, serviceName, price, min, max) {
            const params = new URLSearchParams({
                service_id: serviceId,
                name: serviceName,
                price: price,
                min: min,
                max: max
            });
            const deepLink = `https://t.me/${BOT_USERNAME}?start=mini_${params.toString()}`;
            tg.openTelegramLink(deepLink);
            tg.close();
        }

        loadServices();
    </script>
</body>
</html>
