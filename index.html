<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vest Smm</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a12;
            --surface: #13132b;
            --surface2: #1a1a3e;
            --border: #252550;
            --purple: #8b5cf6;
            --purple-light: #a78bfa;
            --purple-dark: #5b21b6;
            --green: #34d399;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --radius: 16px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Header */
        .header {
            background: linear-gradient(160deg, #4c1d95 0%, #5b21b6 30%, #6d28d9 100%);
            padding: 22px 20px 18px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
        }
        .header .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .header .step {
            font-size: 13px;
            color: #c4b5fd;
            opacity: 0.9;
        }

        /* Breadcrumb */
        .breadcrumb {
            padding: 10px 18px;
            font-size: 13px;
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        .breadcrumb .back-arrow {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--purple-light);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .breadcrumb .path {
            color: var(--purple-light);
            font-weight: 500;
        }
        .hidden { display: none !important; }

        /* Search */
        .search-wrap { padding: 12px 16px; }
        .search-wrap input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .search-wrap input:focus { border-color: var(--purple); }
        .search-wrap input::placeholder { color: #4b5563; }

        /* Platform Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 14px 16px;
        }
        .p-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 10px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .p-card:active {
            background: #1e1b4b;
            border-color: var(--purple);
            transform: scale(0.96);
        }
        .p-card img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        .p-card .p-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .p-card .p-count {
            font-size: 11px;
            color: var(--purple-light);
        }

        /* Category List */
        .list { padding: 6px 16px; }
        .list-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 15px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .list-item:active {
            background: #1e1b4b;
            border-color: var(--purple);
        }
        .list-item .li-name { font-size: 15px; font-weight: 500; }
        .list-item .li-badge {
            background: #2d2050;
            color: var(--purple-light);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Service Card */
        .s-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .s-card:active {
            background: #1e1b4b;
            border-color: var(--purple);
        }
        .s-card .s-name {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 8px;
        }
        .s-card .s-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-dim);
        }
        .s-card .s-price {
            color: var(--green);
            font-weight: 700;
            font-size: 14px;
        }

        /* Detail */
        .detail-wrap { padding: 16px; }
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 20px;
        }
        .detail-card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.3;
            color: #f1f5f9;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a30;
            font-size: 14px;
        }
        .detail-row .dl { color: var(--text-dim); }
        .detail-row .dv { color: var(--text); font-weight: 500; }
        .detail-row .dv.price {
            color: var(--green);
            font-weight: 700;
            font-size: 18px;
        }

        .btn-order {
            display: block;
            width: 100%;
            margin-top: 18px;
            padding: 16px;
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-order:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 16px 30px;
            color: #4b3f6b;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .footer span {
            color: var(--purple);
            font-weight: 700;
        }

        /* States */
        .loader {
            text-align: center;
            padding: 80px 20px;
            color: var(--purple-light);
        }
        .loader .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--purple);
            border-radius: 50%;
            margin: 0 4px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loader .dot:nth-child(2) { animation-delay: 0.2s; }
        .loader .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .empty {
            text-align: center;
            padding: 80px 20px;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Vest Smm</div>
        <div class="step" id="step-title">Выберите платформу</div>
    </div>

    <div class="breadcrumb hidden" id="breadcrumb">
        <div class="back-arrow" onclick="goBack()">←</div>
        <div class="path" id="breadcrumb-text"></div>
    </div>

    <div class="search-wrap hidden" id="search-box">
        <input type="text" id="search" placeholder="Поиск услуг..." oninput="filterServices()">
    </div>

    <div class="grid" id="platforms-screen"></div>
    <div class="list hidden" id="categories-screen"></div>
    <div class="list hidden" id="services-screen"></div>
    <div class="detail-wrap hidden" id="detail-screen"></div>
    <div class="loader hidden" id="loader">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <p style="margin-top:14px">Загрузка...</p>
    </div>
    <div class="footer">
        Powered by <span>Vest Smm</span>
    </div>

    <script>
        const API_KEY = 'd2kALxwu1KIstaUHWXzeb8S2OzmgIg4ct0Z8WCe76I74lZS3bctT9ogN3Eex';
        const BOT_USERNAME = 'Vestsmmmbot';
        const API_URL = 'https://smmway.ru/api/v2';
        const MARGIN = 1.07;

        let allServices = [];
        let platforms = {};
        let categories = {};
        let currentPlatform = '';
        let currentCategory = '';
        let currentServices = [];

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const platformLogos = {
            'Instagram': 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1200px-Instagram_logo_2016.svg.png',
            'Telegram': 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/1200px-Telegram_logo.svg.png',
            'YouTube': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/YouTube_full-color_icon_%282017%29.svg/1200px-YouTube_full-color_icon_%282017%29.svg.png',
            'Twitch': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Twitch_logo_2019.svg/1200px-Twitch_logo_2019.svg.png',
            'TikTok': 'https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/1200px-TikTok_logo.svg.png',
            'Facebook': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1200px-Facebook_Logo_%282019%29.png',
            'Twitter/X': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/X_logo_2023.svg/1200px-X_logo_2023.svg.png',
            'VK': 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/VK.com-logo.svg/1200px-VK.com-logo.svg.png',
            'Discord': 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Discord_app_icon_2023.svg/1200px-Discord_app_icon_2023.svg.png',
            'Spotify': 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Spotify_logo_without_text.svg/1200px-Spotify_logo_without_text.svg.png',
            'SoundCloud': 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/SoundCloud_logo_%282013%29.svg/1200px-SoundCloud_logo_%282013%29.svg.png',
            'Другие': 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Globe_icon_%28The_Noun_Project_30722%29.svg/1200px-Globe_icon_%28The_Noun_Project_30722%29.svg.png'
        };

        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }
        function hideAll() {
            ['platforms-screen','categories-screen','services-screen','detail-screen','loader','search-box','breadcrumb'].forEach(hide);
        }

        async function init() {
            hideAll();
            show('loader');
            try {
                const r = await fetch(`${API_URL}?action=services&key=${API_KEY}`);
                allServices = await r.json();
                buildPlatforms();
                renderPlatforms();
            } catch(e) {
                document.getElementById('platforms-screen').innerHTML = '<div class="empty">Ошибка загрузки</div>';
            }
        }

        function buildPlatforms() {
            platforms = {};
            allServices.forEach(s => {
                const n = s.name.toLowerCase();
                let p = 'Другие';
                if (n.includes('instagram')) p = 'Instagram';
                else if (n.includes('telegram')) p = 'Telegram';
                else if (n.includes('youtube')) p = 'YouTube';
                else if (n.includes('twitch')) p = 'Twitch';
                else if (n.includes('tiktok')) p = 'TikTok';
                else if (n.includes('facebook')) p = 'Facebook';
                else if (n.includes('twitter') || n.includes('x ')) p = 'Twitter/X';
                else if (n.includes('vk ') || n.includes('вк')) p = 'VK';
                else if (n.includes('discord')) p = 'Discord';
                else if (n.includes('spotify')) p = 'Spotify';
                else if (n.includes('soundcloud')) p = 'SoundCloud';
                if (!platforms[p]) platforms[p] = [];
                platforms[p].push(s);
            });
        }

        function getCategory(name) {
            const n = name.toLowerCase();
            if (n.includes('подписчик') || n.includes('subscriber') || n.includes('follow')) return 'Подписчики';
            if (n.includes('лайк') || n.includes('like')) return 'Лайки';
            if (n.includes('просмотр') || n.includes('view')) return 'Просмотры';
            if (n.includes('коммент') || n.includes('comment')) return 'Комментарии';
            if (n.includes('репост') || n.includes('repost') || n.includes('share')) return 'Репосты';
            return 'Другое';
        }

        function renderPlatforms() {
            hideAll();
            show('platforms-screen');
            document.getElementById('step-title').textContent = 'Выберите платформу';
            const div = document.getElementById('platforms-screen');
            div.innerHTML = Object.keys(platforms).sort().map(p => `
                <div class="p-card" onclick="selectPlatform('${p}')">
                    <img src="${platformLogos[p] || platformLogos['Другие']}" alt="${p}" onerror="this.style.display='none'">
                    <div class="p-name">${p}</div>
                    <div class="p-count">${platforms[p].length} услуг</div>
                </div>
            `).join('');
        }

        function selectPlatform(platform) {
            currentPlatform = platform;
            categories = {};
            platforms[platform].forEach(s => {
                const c = getCategory(s.name);
                if (!categories[c]) categories[c] = [];
                categories[c].push(s);
            });
            renderCategories();
        }

        function renderCategories() {
            hideAll();
            show('categories-screen');
            show('breadcrumb');
            document.getElementById('breadcrumb-text').textContent = currentPlatform;
            document.getElementById('step-title').textContent = 'Выберите категорию';
            const div = document.getElementById('categories-screen');
            div.innerHTML = Object.keys(categories).map(c => `
                <div class="list-item" onclick="selectCategory('${c}')">
                    <span class="li-name">${c}</span>
                    <span class="li-badge">${categories[c].length}</span>
                </div>
            `).join('');
        }

        function selectCategory(category) {
            currentCategory = category;
            document.getElementById('search').value = '';
            currentServices = categories[category];
            renderServices();
        }

        function renderServices() {
            hideAll();
            show('services-screen');
            show('search-box');
            show('breadcrumb');
            document.getElementById('breadcrumb-text').textContent = currentPlatform + ' › ' + currentCategory;
            document.getElementById('step-title').textContent = 'Выберите услугу';
            displayServices(currentServices);
        }

        function displayServices(services) {
            const div = document.getElementById('services-screen');
            if (!services.length) {
                div.innerHTML = '<div class="empty">Ничего не найдено</div>';
                return;
            }
            div.innerHTML = services.map(s => {
                const price = (parseFloat(s.rate) * MARGIN).toFixed(2);
                return `
                    <div class="s-card" onclick="showDetail(${s.service}, '${esc(s.name)}', '${price}', ${s.min}, ${s.max})">
                        <div class="s-name">${esc(s.name)}</div>
                        <div class="s-meta">
                            <span>Мин: ${s.min} | Макс: ${s.max}</span>
                            <span class="s-price">≈ ${price} ₽</span>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterServices() {
            const q = document.getElementById('search').value.toLowerCase();
            displayServices(currentServices.filter(s => s.name.toLowerCase().includes(q)));
        }

        function showDetail(serviceId, name, price, min, max) {
            hideAll();
            show('detail-screen');
            show('breadcrumb');
            document.getElementById('breadcrumb-text').textContent = name.substring(0, 35);
            document.getElementById('step-title').textContent = 'Детали услуги';
            document.getElementById('detail-screen').innerHTML = `
                <div class="detail-card">
                    <h3>${name}</h3>
                    <div class="detail-row"><span class="dl">Цена за 1000</span><span class="dv price">${price} ₽</span></div>
                    <div class="detail-row"><span class="dl">Минимальный заказ</span><span class="dv">${min}</span></div>
                    <div class="detail-row"><span class="dl">Максимальный заказ</span><span class="dv">${max}</span></div>
                    <button class="btn-order" onclick="orderService(${serviceId}, '${esc(name)}', '${price}', ${min}, ${max})">Заказать</button>
                </div>`;
        }

        function orderService(serviceId, name, price, min, max) {
            const params = new URLSearchParams({ service_id: serviceId, name: name, price: price, min: min, max: max });
            tg.openTelegramLink(`https://t.me/${BOT_USERNAME}?start=mini_${params.toString()}`);
            tg.close();
        }

        function goBack() {
            if (!document.getElementById('detail-screen').classList.contains('hidden')) renderServices();
            else if (!document.getElementById('services-screen').classList.contains('hidden')) renderCategories();
            else if (!document.getElementById('categories-screen').classList.contains('hidden')) renderPlatforms();
        }

        function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        init();
    </script>
</body>
</html>
